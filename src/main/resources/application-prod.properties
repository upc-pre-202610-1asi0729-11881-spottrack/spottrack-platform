# Production profile
# Read database settings from environment variables expected in Docker/runtime.
spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT:3306}/${DATABASE_NAME}?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=false&publicKeyRetrieval=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Production-lean JPA behavior
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# App port
server.port=${PORT:8080}

# Stripe
stripe.api-key=${STRIPE_SECRET_API_KEY}
# Run: stripe listen --forward-to localhost:8080/api/v1/webhooks/stripe
# Then paste the printed signing secret below
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# JWT secret must be provided as an environment variable in production.
authorization.jwt.secret=${JWT_SECRET}