# Development profile
# Conexión directa al motor de MySQL en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/spottrack-platform?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Developer-friendly JPA behavior (Crea las tablas automáticamente)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# Puerto de la aplicación
server.port=8080
