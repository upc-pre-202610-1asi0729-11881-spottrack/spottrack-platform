# Development profile
# Conexión directa al motor de MySQL en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/spottrack-platform?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password


# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Developer-friendly JPA behavior (Crea las tablas automáticamente)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true


# Stripe
stripe.api-key=${STRIPE_API_KEY}
# Run: stripe listen --forward-to localhost:8080/api/v1/webhooks/stripe
# Then paste the printed signing secret below
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}


# Puerto de la aplicación
server.port=8080
