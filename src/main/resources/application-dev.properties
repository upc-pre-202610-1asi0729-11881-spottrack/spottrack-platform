# Development profile
# Use Dockerfile-compatible environment variable names with local defaults.
spring.datasource.url=jdbc:mysql://localhost:${DATABASE_PORT:3306}/${DATABASE_NAME:spottrack-platform}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Developer-friendly JPA behavior
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# App port
server.port=${PORT:8080}